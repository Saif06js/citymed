<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CityMed — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #0a4d68;
      --accent:  #00a99d;
      --red:     #c0392b;
      --green:   #1a7f5a;
      --amber:   #d4860a;
      --bg:      #f4f6f9;
      --white:   #ffffff;
      --text:    #1c2b3a;
      --muted:   #6b7a8d;
      --border:  #dde3ec;
      --shadow:  0 4px 20px rgba(0,0,0,0.08);
      --radius:  10px;
      --font:    'DM Sans', sans-serif;
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    body.dark {
      --bg:    #08141f;
      --white: #0d1e2e;
      --text:  #dde8f2;
      --muted: #4a6880;
      --border:#1a3448;
      --shadow:0 4px 20px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      font-size: 14px; transition: background 0.3s, color 0.3s;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: var(--font); }

    /* ── BACKGROUND PATHS (hero effect) ── */
    .bg-paths {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
    }
    .bg-paths svg { width: 100%; height: 100%; opacity: 0.06; }
    .bg-paths path {
      stroke: currentColor; fill: none;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawPath 6s ease forwards;
    }
    .bg-paths path:nth-child(2n)   { animation-delay: 0.3s; }
    .bg-paths path:nth-child(3n)   { animation-delay: 0.6s; }
    .bg-paths path:nth-child(4n)   { animation-delay: 0.9s; }
    @keyframes drawPath {
      to { stroke-dashoffset: 0; }
    }

    /* ── SIGN IN PAGE ── */
    #loginGate {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #000; position: relative; overflow: hidden;
    }
    .login-dots {
      position: absolute; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: 22px 22px;
      animation: dotsReveal 2.5s ease forwards; opacity: 0;
    }
    @keyframes dotsReveal {
      0%   { opacity: 0; mask-size: 0% 0%; }
      100% { opacity: 1; mask-size: 200% 200%; }
    }
    .login-radial {
      position: absolute; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
    }
    .login-glow {
      position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(circle at 30% 70%, rgba(10,77,104,0.3) 0%, transparent 50%),
                  radial-gradient(circle at 70% 30%, rgba(0,169,157,0.2) 0%, transparent 50%);
    }
    .login-card {
      position: relative; z-index: 2;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 44px; width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: cardUp 0.6s cubic-bezier(0.34,1.3,0.64,1) both;
    }
    @keyframes cardUp {
      from { opacity:0; transform: translateY(30px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .login-brand {
      display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
    }
    .login-brand-icon {
      width: 36px; height: 36px; background: var(--accent); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .login-brand span { font-size: 18px; font-weight: 700; color: white; }
    .login-badge {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6); font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; padding: 3px 9px; border-radius: 20px; margin-left: auto;
    }
    .login-card h2 { font-size: 26px; font-weight: 700; color: white; margin-bottom: 6px; letter-spacing: -0.5px; }
    .login-card p  { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 28px; }
    .login-form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .login-form-group label {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      color: rgba(255,255,255,0.5);
    }
    .login-form-group input {
      padding: 12px 14px; border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px; font-size: 13px; font-family: var(--font);
      background: rgba(255,255,255,0.06); color: white; outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }
    .login-form-group input::placeholder { color: rgba(255,255,255,0.25); }
    .login-form-group input:focus {
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 0 0 3px rgba(0,169,157,0.15);
    }
    .login-btn {
      width: 100%; padding: 13px; background: white; color: #0a1520; border: none;
      border-radius: 25px; font-size: 14px; font-weight: 700; font-family: var(--font);
      cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .login-btn:hover { background: rgba(255,255,255,0.92); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,255,255,0.15); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-error { color: #ff6b6b; font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }
    .back-link { text-align: center; margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.3); }
    .back-link a { color: rgba(255,255,255,0.6); font-weight: 600; transition: color 0.2s; }
    .back-link a:hover { color: white; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    .admin-header {
      background: #0f1e2e; padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    body.dark .admin-header { background: #040d16; }

    .admin-logo { display: flex; align-items: center; gap: 10px; color: white; font-size: 17px; font-weight: 700; }
    .admin-logo-icon {
      width: 34px; height: 34px; background: var(--accent); border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .admin-logo-badge {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5); font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px; padding: 2px 8px; border-radius: 20px;
    }

    .admin-nav { display: flex; gap: 4px; }
    .admin-nav a {
      color: rgba(255,255,255,0.6); padding: 7px 14px; border-radius: 7px;
      font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .admin-nav a:hover, .admin-nav a.active { background: rgba(255,255,255,0.1); color: white; }

    .admin-user-wrap { position: relative; }
    .admin-user-btn {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: white; padding: 6px 12px 6px 8px; border-radius: 8px;
      font-size: 13px; font-weight: 500; transition: all 0.2s;
    }
    .admin-user-btn:hover { background: rgba(255,255,255,0.14); }
    .admin-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
    }

    .admin-dropdown {
      display: none; position: absolute; top: calc(100% + 8px); right: 0;
      background: #0f1e2e; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; width: 220px; overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5); z-index: 200;
      animation: fadeDown 0.15s ease;
    }
    .admin-dropdown.open { display: block; }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

    .admin-dropdown-header { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .adh-name { font-size: 13px; font-weight: 700; color: white; }
    .adh-role { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .admin-dropdown-menu { padding: 6px; }
    .adm-item {
      display: flex; align-items: center; gap: 9px; padding: 9px 11px;
      border-radius: 7px; font-size: 13px; color: rgba(255,255,255,0.7);
      cursor: pointer; transition: background 0.2s;
    }
    .adm-item:hover { background: rgba(255,255,255,0.07); color: white; }
    .adm-item.danger { color: #ff6b6b; }
    .adm-item.danger:hover { background: rgba(192,57,43,0.15); }
    .adm-sep { height: 1px; background: rgba(255,255,255,0.07); margin: 4px 0; }

    /* Theme dock for admin dropdown */
    .theme-dock {
      margin: 6px; display: flex; border-radius: 9px; overflow: hidden;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    }
    .theme-dock-btn {
      flex: 1; padding: 8px 4px; border: none; background: transparent;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4);
      transition: all 0.2s; border-right: 1px solid rgba(255,255,255,0.07);
      font-family: var(--font); cursor: pointer;
    }
    .theme-dock-btn:last-child { border-right: none; }
    .theme-dock-btn:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); }
    .theme-dock-btn.active { background: var(--accent); color: white; }

    /* ── DASHBOARD BODY ── */
    .dash-body { max-width: 1200px; margin: 0 auto; padding: 30px 40px; position: relative; }

    /* Glow background */
    .dash-glow {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,169,157,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(10,77,104,0.08) 0%, transparent 50%);
    }
    body.dark .dash-glow {
      background:
        radial-gradient(circle at 20% 20%, rgba(0,169,157,0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(10,77,104,0.06) 0%, transparent 50%);
    }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--white); border-radius: 14px; padding: 22px;
      border: 1px solid var(--border); box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--primary);
    }
    .stat-card:nth-child(2)::before { background: var(--amber); }
    .stat-card:nth-child(3)::before { background: var(--green); }
    .stat-card:nth-child(4)::before { background: var(--red); }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    .stat-card-label { font-size: 11.5px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .stat-card-num { font-size: 34px; font-weight: 800; color: var(--text); letter-spacing: -1px; }
    .stat-card-num.pending   { color: var(--amber); }
    .stat-card-num.confirmed { color: var(--green); }
    .stat-card-num.cancelled { color: var(--red); }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar-title { font-size: 18px; font-weight: 700; flex: 1; }
    .filter-select {
      padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--white); font-size: 13px; font-family: var(--font);
      outline: none; cursor: pointer; color: var(--text); transition: border 0.2s;
    }
    .filter-select:focus { border-color: var(--primary); }
    .search-input {
      padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 9px;
      font-size: 13px; font-family: var(--font); outline: none; width: 220px;
      background: var(--white); color: var(--text); transition: border 0.2s;
    }
    .search-input:focus { border-color: var(--primary); }
    .refresh-btn {
      padding: 8px 18px; background: var(--primary); color: white; border: none;
      border-radius: 9px; font-size: 13px; font-weight: 600; font-family: var(--font);
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .refresh-btn:hover { background: #0d6b91; transform: translateY(-1px); }

    /* Table */
    .table-wrap {
      background: var(--white); border-radius: 14px; border: 1px solid var(--border);
      overflow: hidden; box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--bg); }
    th {
      padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      font-size: 13px; color: var(--text); vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(10,77,104,0.03); }
    body.dark tr:hover td { background: rgba(255,255,255,0.02); }

    .status-select {
      padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 12px; font-family: var(--font); outline: none;
      cursor: pointer; background: var(--white); color: var(--text); transition: border 0.2s;
    }
    .status-select:focus { border-color: var(--primary); }

    .delete-btn {
      background: none; border: none; color: var(--muted);
      width: 30px; height: 30px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }
    .delete-btn:hover { background: #fef2f2; color: var(--red); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .icon { margin-bottom: 12px; opacity: 0.4; display: flex; justify-content: center; }
    .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

    /* ── PREMIUM TOAST ── */
    .toast-container {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      display: flex; flex-direction: column; gap: 0; pointer-events: none; width: 360px;
    }
    .toast-item {
      position: absolute; bottom: 0; right: 0; width: 360px;
      background: #1c2b3a; color: white; padding: 14px 16px; border-radius: 14px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      pointer-events: all; transition: transform 0.35s cubic-bezier(0.25,0.75,0.6,0.98), opacity 0.35s ease;
      transform: translateY(100px); opacity: 0;
    }
    .toast-item.show { transform: translateY(0); opacity: 1; }
    .toast-item.success { background: var(--green); }
    .toast-item.error   { background: var(--red); }
    .toast-item.warning { background: var(--amber); color: #1a1a1a; }
    .toast-close {
      background: rgba(255,255,255,0.15); border: none; color: inherit;
      width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s;
    }
    .toast-close:hover { background: rgba(255,255,255,0.3); }

    @media (max-width: 768px) {
      .admin-header { padding: 0 16px; }
      .dash-body { padding: 16px; }
      .stats-row { grid-template-columns: repeat(2,1fr); }
      .admin-nav { display: none; }
      .toast-container { right: 12px; left: 12px; width: auto; }
      .toast-item { width: 100%; }
    }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ══ LOGIN GATE ══ -->
<div id="loginGate">
  <div class="login-dots"></div>
  <div class="login-glow"></div>
  <div class="login-radial"></div>

  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">
        <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
          <path d="M6 11h10M11 6v10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span>CityMed</span>
      <span class="login-badge">Admin</span>
    </div>
    <h2>Welcome back</h2>
    <p>Sign in to manage your dashboard</p>

    <div class="login-form-group">
      <label>Email address</label>
      <input type="email" id="adminEmail" placeholder="admin@citymed.com" autocomplete="email"/>
    </div>
    <div class="login-form-group">
      <label>Password</label>
      <input type="password" id="adminPassword" placeholder="Your password"
             onkeydown="if(event.key==='Enter') adminLogin()" autocomplete="current-password"/>
    </div>
    <button class="login-btn" id="loginBtn" onclick="adminLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
    <div class="back-link"><a href="hos2.html">← Back to CityMed</a></div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard">

  <!-- Glow background -->
  <div class="dash-glow"></div>

  <!-- Header -->
  <div class="admin-header">
    <div class="admin-logo">
      <div class="admin-logo-icon">
        <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
          <path d="M6 11h10M11 6v10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      CityMed
      <span class="admin-logo-badge">Admin</span>
    </div>

    <nav class="admin-nav">
      <a href="#" class="active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Bookings
      </a>
    </nav>

    <div class="admin-user-wrap">
      <button class="admin-user-btn" onclick="toggleAdminDropdown()">
        <div class="admin-avatar" id="adminAvatarCircle">A</div>
        <span id="adminUserName">Admin</span>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="admin-dropdown" id="adminDropdown">
        <div class="admin-dropdown-header">
          <div class="adh-name" id="adminDropdownName">Admin</div>
          <div class="adh-role">Administrator</div>
        </div>
        <div class="admin-dropdown-menu">
          <div class="theme-dock" id="adminThemeDock">
            <!-- filled by JS -->
          </div>
          <div class="adm-sep"></div>
          <div class="adm-item danger" onclick="adminLogout()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Body with BackgroundPaths effect in header area -->
  <div class="dash-body">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-card-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Total Bookings
        </div>
        <div class="stat-card-num" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Pending
        </div>
        <div class="stat-card-num pending" id="statPending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Confirmed
        </div>
        <div class="stat-card-num confirmed" id="statConfirmed">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          Cancelled
        </div>
        <div class="stat-card-num cancelled" id="statCancelled">—</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <span class="toolbar-title">Appointment Requests</span>
      <input type="text" class="search-input" id="searchBookings"
             placeholder="Search name or hospital..." oninput="renderTable()"/>
      <select class="filter-select" id="statusFilter" onchange="renderTable()">
        <option value="all">All statuses</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <button class="refresh-btn" onclick="loadBookings()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Patient</th>
            <th>Phone</th>
            <th>Hospital</th>
            <th>Department</th>
            <th>Date</th>
            <th>Booked At</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="bookingsTable">
          <tr><td colspan="9" class="loading">Loading bookings...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  const SUPABASE_URL  = 'https://qzppzysjzgslfmlalqcd.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6cHB6eXNqemdzbGZtbGFscWNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjA0MjEsImV4cCI6MjA5MTEzNjQyMX0.HWIbu_3BTvbrJDjQyPrX0f0-gcHr4YWBaNc1EWRHWkw';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let allBookings = [];

  /* ── THEME ── */
  function applyTheme(theme) {
    document.body.classList.toggle('dark', theme === 'dark');
    localStorage.setItem('citymed-admin-theme', theme);
    renderThemeDock();
  }
  function renderThemeDock() {
    const current = localStorage.getItem('citymed-admin-theme') || 'light';
    const dock = document.getElementById('adminThemeDock');
    if (!dock) return;
    dock.innerHTML = `
      <button class="theme-dock-btn ${current==='light'?'active':''}" onclick="applyTheme('light')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
        Light
      </button>
      <button class="theme-dock-btn ${current==='dark'?'active':''}" onclick="applyTheme('dark')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        Dark
      </button>
    `;
  }
  (function() { applyTheme(localStorage.getItem('citymed-admin-theme') || 'light'); })();

  /* ── TOAST ── */
  let toastList = []; let toastIdCounter = 0;
  function showToast(msg, type = '', duration = 3500) {
    const container = document.getElementById('toastContainer');
    const id = ++toastIdCounter;
    const item = document.createElement('div');
    item.className = 'toast-item' + (type ? ' ' + type : '');
    item.innerHTML = `<span style="flex:1">${msg}</span><button class="toast-close" onclick="removeToast(${id})"><svg width="8" height="8" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>`;
    toastList.forEach((t,i) => {
      const offset = (toastList.length - i) * 10;
      const scale  = 1 - (toastList.length - i) * 0.04;
      t.el.style.transform = `translateY(-${offset}px) scale(${scale})`;
    });
    container.appendChild(item);
    const entry = { id, el: item };
    toastList.push(entry);
    requestAnimationFrame(() => requestAnimationFrame(() => item.classList.add('show')));
    let timer = setTimeout(() => removeToast(id), duration);
    item.addEventListener('mouseenter', () => clearTimeout(timer));
    item.addEventListener('mouseleave', () => { timer = setTimeout(() => removeToast(id), 1500); });
  }
  window.removeToast = function(id) {
    const idx = toastList.findIndex(t => t.id === id);
    if (idx === -1) return;
    const { el } = toastList[idx];
    el.classList.remove('show'); el.style.opacity = '0'; el.style.transform = 'translateY(20px)';
    setTimeout(() => { el.remove(); toastList.splice(idx, 1); toastList.forEach((t,i) => { const offset=(toastList.length-1-i)*10; const scale=1-(toastList.length-1-i)*0.04; t.el.style.transform=`translateY(-${offset}px) scale(${scale})`; }); }, 350);
  };

  /* ── DROPDOWN ── */
  window.toggleAdminDropdown = function() {
    document.getElementById('adminDropdown')?.classList.toggle('open');
  };
  document.addEventListener('click', e => {
    const wrap = document.querySelector('.admin-user-wrap');
    if (wrap && !wrap.contains(e.target)) document.getElementById('adminDropdown')?.classList.remove('open');
  });

  /* ── AUTH ── */
  db.auth.onAuthStateChange((event, session) => {
    if (session?.user) {
      document.getElementById('loginGate').style.display  = 'none';
      document.getElementById('dashboard').style.display  = 'block';
      const email = session.user.email;
      const initials = email.slice(0,2).toUpperCase();
      document.getElementById('adminUserName').textContent    = email.split('@')[0];
      document.getElementById('adminDropdownName').textContent = email;
      document.getElementById('adminAvatarCircle').textContent = initials;
      renderThemeDock();
      loadBookings();
    } else {
      document.getElementById('loginGate').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }
  });

  async function adminLogin() {
    const email    = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value.trim();
    const errEl    = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Please fill in both fields.'; return; }
    btn.textContent = 'Signing in...'; btn.disabled = true;
    const { error } = await db.auth.signInWithPassword({ email, password });
    btn.textContent = 'Sign In'; btn.disabled = false;
    if (error) { errEl.textContent = error.message; }
  }

  async function adminLogout() {
    await db.auth.signOut();
    showToast('Signed out successfully.');
  }

  /* ── BOOKINGS ── */
  async function loadBookings() {
    const tbody = document.getElementById('bookingsTable');
    tbody.innerHTML = '<tr><td colspan="9" class="loading">Loading...</td></tr>';
    const { data, error } = await db.from('bookings').select('*').order('created_at', { ascending: false });
    if (error) {
      tbody.innerHTML = `<tr><td colspan="9" class="loading" style="color:var(--red)">Error: ${error.message}</td></tr>`;
      return;
    }
    allBookings = data || [];
    updateStats();
    renderTable();
  }

  function updateStats() {
    document.getElementById('statTotal').textContent     = allBookings.length;
    document.getElementById('statPending').textContent   = allBookings.filter(b=>b.status==='pending').length;
    document.getElementById('statConfirmed').textContent = allBookings.filter(b=>b.status==='confirmed').length;
    document.getElementById('statCancelled').textContent = allBookings.filter(b=>b.status==='cancelled').length;
  }

  function renderTable() {
    const search = document.getElementById('searchBookings').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;
    const filtered = allBookings.filter(b => {
      const ms = !search || (b.full_name||'').toLowerCase().includes(search) || (b.hospital||'').toLowerCase().includes(search);
      const st = status === 'all' || b.status === status;
      return ms && st;
    });
    const tbody = document.getElementById('bookingsTable');
    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><h3>No bookings found</h3><p>Try adjusting the filters.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = filtered.map((b,i) => `
      <tr>
        <td style="color:var(--muted);font-size:12px;">${i+1}</td>
        <td><strong>${b.full_name||'—'}</strong></td>
        <td>${b.phone||'—'}</td>
        <td>${b.hospital||'—'}</td>
        <td>${b.department||'—'}</td>
        <td>${formatDate(b.book_date)}</td>
        <td style="color:var(--muted);font-size:12px;">${formatDateTime(b.created_at)}</td>
        <td>
          <select class="status-select" onchange="updateStatus('${b.id}',this.value)">
            <option value="pending"   ${b.status==='pending'?'selected':''}>Pending</option>
            <option value="confirmed" ${b.status==='confirmed'?'selected':''}>Confirmed</option>
            <option value="cancelled" ${b.status==='cancelled'?'selected':''}>Cancelled</option>
          </select>
        </td>
        <td>
          <button class="delete-btn" onclick="deleteBooking('${b.id}')" title="Delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </td>
      </tr>
    `).join('');
  }

  async function updateStatus(id, newStatus) {
    const { error } = await db.from('bookings').update({ status: newStatus }).eq('id', id);
    if (error) { showToast('Failed: ' + error.message, 'error'); return; }
    const b = allBookings.find(b => b.id === id);
    if (b) b.status = newStatus;
    updateStats();
    showToast(`Status updated to "${newStatus}"`, 'success');
  }

  async function deleteBooking(id) {
    if (!confirm('Delete this booking? This cannot be undone.')) return;
    const { error } = await db.from('bookings').delete().eq('id', id);
    if (error) { showToast('Failed to delete: ' + error.message, 'error'); return; }
    allBookings = allBookings.filter(b => b.id !== id);
    updateStats(); renderTable();
    showToast('Booking deleted.', 'warning');
  }

  function formatDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  }
  function formatDateTime(str) {
    if (!str) return '—';
    return new Date(str).toLocaleString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }
</script>
</body>
</html>
